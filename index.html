 </div> <!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Dynamic Visuals</title>
 <style>
 body {
 margin: 0;
 font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
 background: #0f172a;
 color: #f8fafc;
 display: flex;
 justify-content: center;
 align-items: center;
 min-height: 100vh;
 overflow: hidden;
 }
 .container {
 text-align: center;
 }
 .circle {
 width: 150px;
 height: 150px;
 background: linear-gradient(135deg, #3b82f6, #8b5cf6);
 border-radius: 50%;
 margin: 0 auto 2rem;
 animation: pulse 2s infinite ease-in-out;
 box-shadow: 0 0 30px rgba(59, 130, 246, 0.5);
 }
 @keyframes pulse {
 0%, 100% { transform: scale(1); opacity: 0.8; }
 50% { transform: scale(1.1); opacity: 1; box-shadow: 0 0 50px rgba(139, 92, 246, 0.8); }
 }
 button {
 background: #3b82f6;
 color: white;
 border: none;
 padding: 0.75rem 1.5rem;
 font-size: 1rem;
 font-weight: bold;
 border-radius: 0.5rem;
 cursor: pointer;
 transition: transform 0.2s, background 0.2s;
 }
 button:hover {
 background: #2563eb;
 transform: scale(1.05);
 }
 </style>
</head>
<body>
 <div class="container">
 <div class="circle"></div>
 <h1>Modern Interactive Visuals</h1>
 <p>Clean CSS animations with zero external dependencies.</p>
 <button>Explore</button>
 </div>
</body>
</html>

 <section class="h-screen flex items-center justify-center bg-gray-100">

 <p class="mt-4 text-gray-600">Lightweight Lottie Animation</p>
 </div>
 </section>

</body>
</html>
